# SHIELD_IDS SOC Command Console — Nginx Reverse Proxy & SSL Configuration

server {
    listen 80;
    server_name shield-ids.example.com;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name shield-ids.example.com;

    # Let's Encrypt SSL Certificate Files
    ssl_certificate /etc/letsencrypt/live/shield-ids.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shield-ids.example.com/privkey.pem;

    # TLS 1.2 / 1.3 Security Parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gunicorn App Proxy
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Static Assets Cache Control
    location /static/ {
        alias /app/backend/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
