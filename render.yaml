services:
  - type: web
    name: shield-ids-web
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py "backend.app:create_app()"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shield-ids-db
          property: connectionString
      - key: SNIFFER_SIMULATION
        value: "TRUE"
      - key: SEND_EMAIL_NOTIFICATIONS
        value: "TRUE"

databases:
  - name: shield-ids-db
    databaseName: network_monitor
    user: shield_admin
    plan: free
