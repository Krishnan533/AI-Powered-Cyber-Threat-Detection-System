version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: Docker/db.Dockerfile
    container_name: threat_monitor_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: network_monitor
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Docker/flask.Dockerfile
    container_name: threat_monitor_web
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@db:3306/network_monitor
      - SECRET_KEY=prod_docker_secret_key_90812304918230
      - FLASK_ENV=production
      - SNIFFER_SIMULATION=TRUE
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USE_TLS=TRUE
      - MAIL_USERNAME=your-email@gmail.com
      - MAIL_PASSWORD=your-app-specific-password
      - MAIL_DEFAULT_SENDER=threat-alerts@example.com
      - ADMIN_EMAIL=admin-alerts@example.com
    volumes:
      - .:/app

  sniffer:
    build:
      context: .
      dockerfile: Docker/flask.Dockerfile
    container_name: threat_monitor_sniffer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@localhost:3306/network_monitor
      - SNIFFER_SIMULATION=FALSE
      - SNIFFER_INTERFACE=eth0
    entrypoint: python scripts/run_sniffer.py

volumes:
  db_data:
