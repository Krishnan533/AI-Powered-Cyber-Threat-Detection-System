<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIELD_IDS — Security Console Authentication</title>
    <!-- Fonts: Space Grotesk, JetBrains Mono, Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Custom SOC Console CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: var(--bg-void);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #bgGlobeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.35;
        }

        .auth-card-container {
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="bgGlobeCanvas"></div>

    <div class="auth-card-container">
        <div class="glass-panel p-4 p-md-5 shadow-lg">
            
            <div class="text-center mb-4">
                <a href="/landing" class="text-decoration-none">
                    <div class="brand-logo bg-neon-cyan text-dark d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 55px; height: 55px; box-shadow: 0 0 20px var(--accent-cyan-glow);">
                        <i class="fa-solid fa-shield-halved fa-2xl"></i>
                    </div>
                </a>
                <h3 class="text-white font-weight-bold tracking-wide brand-title">SHIELD_IDS SOC</h3>
                <p class="text-grey font-mono" style="font-size: 0.78rem;">SECURE ADMINISTRATIVE AUTHENTICATION</p>
            </div>

            <div class="alert alert-danger d-none bg-danger-transparent border-danger text-white mb-4" id="loginError" role="alert">
                <i class="fa-solid fa-circle-exclamation me-2 text-neon-red"></i>
                <span id="loginErrorMsg" style="font-size: 0.85rem;">Invalid credentials.</span>
            </div>

            <form id="loginForm">
                <div class="mb-4">
                    <label for="username" class="form-label text-grey font-mono text-uppercase" style="font-size: 0.72rem;">Username</label>
                    <div class="input-group">
                        <span class="input-group-text border-glass bg-transparent text-grey"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control font-mono" id="username" placeholder="Enter username" required autocomplete="username">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-grey font-mono text-uppercase" style="font-size: 0.72rem;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-glass bg-transparent text-grey"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control font-mono" id="password" placeholder="Enter password" required autocomplete="current-password">
                        <button type="button" class="btn border-glass bg-transparent text-grey" id="togglePasswordBtn">
                            <i class="fa-solid fa-eye-slash" id="passwordEyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-neon-cyan w-100 py-2.5 font-weight-bold d-flex align-items-center justify-content-center gap-2 mt-3" id="submitBtn">
                    <i class="fa-solid fa-unlock-keyhole"></i>
                    <span>AUTHENTICATE CONSOLE</span>
                </button>
            </form>

            <div class="text-center mt-4 pt-2 border-top border-glass" style="font-size: 0.82rem;">
                <span class="text-grey">Need operator access?</span>
                <a href="/register" class="text-neon-cyan text-decoration-none ms-1 font-weight-bold">Register Account</a>
            </div>
        </div>
    </div>

    <!-- CSRF Token helper -->
    <input type="hidden" id="globalCsrfToken" value="{{ csrf_token }}">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/cursor.js') }}"></script>
    <script>
        // Background globe animation
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('bgGlobeCanvas');
            if (container && typeof THREE !== 'undefined') {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 200;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);

                const geometry = new THREE.SphereGeometry(70, 32, 32);
                const material = new THREE.PointsMaterial({ color: 0x00E5FF, size: 1.5, transparent: true, opacity: 0.5 });
                const points = new THREE.Points(geometry, material);
                scene.add(points);

                function animate() {
                    requestAnimationFrame(animate);
                    points.rotation.y += 0.002;
                    renderer.render(scene, camera);
                }
                animate();
            }
        });

        // Password visibility toggler
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const passwordInput = document.getElementById('password');
        const passwordEyeIcon = document.getElementById('passwordEyeIcon');

        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordEyeIcon.classList.remove('fa-eye-slash');
                passwordEyeIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                passwordEyeIcon.classList.remove('fa-eye');
                passwordEyeIcon.classList.add('fa-eye-slash');
            }
        });

        // Form submission
        const loginForm = document.getElementById('loginForm');
        const errorAlert = document.getElementById('loginError');
        const errorMsg = document.getElementById('loginErrorMsg');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-2"></i><span>AUTHENTICATING...</span>`;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const csrfToken = document.getElementById('globalCsrfToken') ? document.getElementById('globalCsrfToken').value : '';
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.textContent = data.message || 'Login failed. Invalid username or password.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorMsg.textContent = 'Server communication error. Please ensure database and backend services are active.';
                errorAlert.classList.remove('d-none');
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-unlock-keyhole"></i><span>AUTHENTICATE CONSOLE</span>`;
            }
        });
    </script>
</body>
</html>
