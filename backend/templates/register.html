<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIELD_IDS — Register Operator Account</title>
    <!-- Fonts: Space Grotesk, JetBrains Mono, Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Custom SOC Console CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: var(--bg-void);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #bgGlobeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.35;
        }

        .auth-card-container {
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="bgGlobeCanvas"></div>

    <div class="auth-card-container">
        <div class="glass-panel p-4 p-md-5 shadow-lg">
            
            <div class="text-center mb-4">
                <a href="/landing" class="text-decoration-none">
                    <div class="brand-logo bg-neon-cyan text-dark d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 55px; height: 55px; box-shadow: 0 0 20px var(--accent-cyan-glow);">
                        <i class="fa-solid fa-user-plus fa-xl"></i>
                    </div>
                </a>
                <h3 class="text-white font-weight-bold tracking-wide brand-title">REGISTER OPERATOR</h3>
                <p class="text-grey font-mono" style="font-size: 0.78rem;">CREATE TELEMETRY VIEWER ACCESS</p>
            </div>

            <div class="alert alert-danger d-none bg-danger-transparent border-danger text-white mb-4" id="registerError" role="alert">
                <i class="fa-solid fa-circle-exclamation me-2 text-neon-red"></i>
                <span id="registerErrorMsg" style="font-size: 0.85rem;">Registration failed.</span>
            </div>

            <div class="alert alert-success d-none bg-darker-slate border-glass text-neon-green mb-4" id="registerSuccess" role="alert">
                <i class="fa-solid fa-circle-check me-2"></i>
                Account registered successfully! Redirecting to login...
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label for="username" class="form-label text-grey font-mono text-uppercase" style="font-size: 0.72rem;">Username</label>
                    <div class="input-group">
                        <span class="input-group-text border-glass bg-transparent text-grey"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control font-mono" id="username" placeholder="Choose username" required autocomplete="username">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label text-grey font-mono text-uppercase" style="font-size: 0.72rem;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-glass bg-transparent text-grey"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control font-mono" id="password" placeholder="Create password" required autocomplete="new-password">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label text-grey font-mono text-uppercase" style="font-size: 0.72rem;">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-glass bg-transparent text-grey"><i class="fa-solid fa-check-double"></i></span>
                        <input type="password" class="form-control font-mono" id="confirmPassword" placeholder="Confirm password" required autocomplete="new-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-neon-cyan w-100 py-2.5 font-weight-bold d-flex align-items-center justify-content-center gap-2 mt-2">
                    <i class="fa-solid fa-user-plus"></i>
                    <span>CREATE ACCESS ACCOUNT</span>
                </button>
                
                <div class="text-center mt-4 pt-2 border-top border-glass" style="font-size: 0.82rem;">
                    <span class="text-grey">Already registered?</span>
                    <a href="/login" class="text-neon-cyan text-decoration-none ms-1 font-weight-bold">Return to Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/cursor.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('bgGlobeCanvas');
            if (container && typeof THREE !== 'undefined') {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 200;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);

                const geometry = new THREE.SphereGeometry(70, 32, 32);
                const material = new THREE.PointsMaterial({ color: 0x2F6FFF, size: 1.5, transparent: true, opacity: 0.5 });
                const points = new THREE.Points(geometry, material);
                scene.add(points);

                function animate() {
                    requestAnimationFrame(animate);
                    points.rotation.y += 0.002;
                    renderer.render(scene, camera);
                }
                animate();
            }
        });

        const registerForm = document.getElementById('registerForm');
        const errorAlert = document.getElementById('registerError');
        const errorMsg = document.getElementById('registerErrorMsg');
        const successAlert = document.getElementById('registerSuccess');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                errorAlert.classList.remove('d-none');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ username, password, role: 'Viewer' })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successAlert.classList.remove('d-none');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorMsg.textContent = data.message || 'Registration failed.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorMsg.textContent = 'Server communication error. Please ensure database is active.';
                errorAlert.classList.remove('d-none');
                console.error(err);
            }
        });
    </script>
</body>
</html>
