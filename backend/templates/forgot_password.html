<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — SHIELD_IDS SOC Command Console</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome & Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <!-- Custom Cyberpunk Design Tokens -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="bg-void min-vh-100 d-flex align-items-center justify-content-center p-3 position-relative overflow-hidden">

    <!-- 3D Threat Globe Canvas Backdrop -->
    <div id="globeCanvasContainer" class="position-absolute top-0 start-0 w-100 h-100" style="z-index: 0; opacity: 0.4;"></div>

    <!-- Main Glassmorphism Forgot Password Card -->
    <div class="glass-panel p-4 p-sm-5 rounded-4 position-relative z-1 shadow-lg" style="max-width: 440px; width: 100%;">
        
        <!-- Header Branding -->
        <div class="text-center mb-4">
            <a href="/" class="d-inline-flex align-items-center gap-2 text-decoration-none mb-3">
                <div class="brand-logo bg-neon-cyan text-dark d-flex align-items-center justify-content-center rounded-circle" style="width: 48px; height: 48px;">
                    <i class="fa-solid fa-key fa-xl"></i>
                </div>
            </a>
            <h3 class="text-white font-weight-bold tracking-wide m-0" style="font-family: var(--font-display);">PASSWORD RESET</h3>
            <p class="text-grey font-mono mt-1" style="font-size: 0.8rem;">Enter your username or registered email</p>
        </div>

        <!-- Feedback Alert Container -->
        <div id="alertContainer"></div>

        <!-- Forgot Password Form -->
        <form id="forgotForm" class="font-mono">
            <div class="mb-4">
                <label for="username_or_email" class="form-label text-grey text-uppercase" style="font-size: 0.72rem;">Username or Email Address</label>
                <div class="input-group">
                    <span class="input-group-text border-glass bg-transparent text-grey"><i class="fa-solid fa-envelope"></i></span>
                    <input type="text" class="form-control font-mono" id="username_or_email" name="username_or_email" placeholder="admin@example.com or admin" required autocomplete="username">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-neon-cyan w-100 py-3 font-weight-bold d-flex align-items-center justify-content-center gap-2 mb-3">
                <i class="fa-solid fa-paper-plane"></i>
                <span>SEND RESET LINK</span>
            </button>
        </form>

        <div class="text-center pt-2 border-top border-glass mt-3">
            <a href="/login" class="text-neon-cyan text-decoration-none font-mono" style="font-size: 0.8rem;"><i class="fa-solid fa-arrow-left me-1"></i> Back to Console Login</a>
        </div>
    </div>

    <input type="hidden" id="globalCsrfToken" value="{{ csrf_token }}">

    <script src="{{ url_for('static', filename='js/globe.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.ThreatGlobe && document.getElementById('globeCanvasContainer')) {
                window.ThreatGlobe.initHeroGlobe('globeCanvasContainer');
            }

            const forgotForm = document.getElementById("forgotForm");
            const submitBtn = document.getElementById("submitBtn");
            const alertContainer = document.getElementById("alertContainer");

            forgotForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const username_or_email = document.getElementById("username_or_email").value.trim();
                const csrfToken = document.getElementById("globalCsrfToken").value;

                submitBtn.disabled = true;
                submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>DISPATCHING...</span>`;
                alertContainer.innerHTML = "";

                try {
                    const response = await fetch('/api/auth/forgot-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-Token': csrfToken
                        },
                        body: JSON.stringify({ username_or_email })
                    });

                    const data = await response.json();
                    if (response.ok && data.success) {
                        alertContainer.innerHTML = `
                            <div class="alert alert-success border-success bg-dark-slate text-white d-flex align-items-center gap-2 mb-3 font-mono" style="font-size: 0.8rem;">
                                <i class="fa-solid fa-circle-check text-neon-green"></i>
                                <div>${data.message}</div>
                            </div>
                        `;
                    } else {
                        alertContainer.innerHTML = `
                            <div class="alert alert-danger border-danger bg-dark-slate text-white d-flex align-items-center gap-2 mb-3 font-mono" style="font-size: 0.8rem;">
                                <i class="fa-solid fa-circle-exclamation text-neon-red"></i>
                                <div>${data.message || 'Request failed.'}</div>
                            </div>
                        `;
                    }
                } catch (err) {
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger border-danger bg-dark-slate text-white d-flex align-items-center gap-2 mb-3 font-mono" style="font-size: 0.8rem;">
                            <i class="fa-solid fa-circle-exclamation text-neon-red"></i>
                            <div>Server connection error. Please try again.</div>
                        </div>
                    `;
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span>SEND RESET LINK</span>`;
                }
            });
        });
    </script>
</body>
</html>
